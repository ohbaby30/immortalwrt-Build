name: Build ImmortalWrt R4S

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "ImmortalWrt branch"
        required: true
        default: "master"
      config:
        description: "Config file in this repo"
        required: true
        default: "configs/r4s.config"
  schedule:
    # GitHub cron uses UTC. This runs every Sunday at 02:00 Asia/Shanghai.
    - cron: "0 18 * * 6"

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout build config
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Install build dependencies
        run: |
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'

      - name: Clone ImmortalWrt
        run: |
          git clone -b "${{ inputs.branch || 'master' }}" --single-branch --filter=blob:none https://github.com/immortalwrt/immortalwrt immortalwrt

      - name: Add custom feeds
        working-directory: immortalwrt
        run: |
          {
            echo "src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main"
            echo "src-git passwall2 https://github.com/Openwrt-Passwall/openwrt-passwall2.git;main"
          } >> feeds.conf.default

      - name: Update feeds
        working-directory: immortalwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom files
        run: |
          if [ -d files-r4s ]; then
            mkdir -p immortalwrt/files
            cp -a files-r4s/. immortalwrt/files/
          fi

      - name: Load config
        run: |
          cp "${{ inputs.config || 'configs/r4s.config' }}" immortalwrt/.config

      - name: Make defconfig
        working-directory: immortalwrt
        run: |
          make defconfig

      - name: Download sources
        working-directory: immortalwrt
        run: |
          make download -j"$(nproc)"
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        working-directory: immortalwrt
        run: |
          make -j"$(nproc)" V=s

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p artifact
          if [ -d immortalwrt/bin/targets ]; then
            find immortalwrt/bin/targets -type f \
              \( -name "*.bin" -o -name "*.img" -o -name "*.gz" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "*.json" \) \
              -exec cp -v {} artifact/ \;
          fi

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: immortalwrt-r4s-${{ inputs.branch || 'master' }}-${{ github.run_number }}
          name: ImmortalWrt R4S ${{ inputs.branch || 'master' }} build ${{ github.run_number }}
          files: artifact/immortalwrt-rockchip-armv8-friendlyarm_nanopi-r4s-squashfs-sysupgrade.img.gz
          fail_on_unmatched_files: true
          make_latest: true

      - name: Delete old R4S releases
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const currentTag = 'immortalwrt-r4s-${{ inputs.branch || 'master' }}-${{ github.run_number }}';
            const prefix = 'immortalwrt-r4s-';
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const release of releases) {
              if (!release.tag_name.startsWith(prefix) || release.tag_name === currentTag) {
                continue;
              }

              core.info(`Deleting old release ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });

              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (error) {
                core.warning(`Could not delete tag ${release.tag_name}: ${error.message}`);
              }
            }

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: immortalwrt-r4s-${{ inputs.branch || 'master' }}-${{ github.run_number }}
          path: artifact/
          if-no-files-found: warn
          retention-days: 7
